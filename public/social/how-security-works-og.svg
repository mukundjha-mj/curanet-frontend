  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)" />
  <rect width="1200" height="630" rx="28" fill="url(#glow)" />

  <rect x="72" y="62" width="180" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.22" />
