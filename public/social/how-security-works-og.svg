<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081020" />
      <stop offset="0.55" stop-color="#1E265B" />
      <stop offset="1" stop-color="#3A4BC7" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 110) rotate(145) scale(440 320)">
      <stop stop-color="#A9C8FF" stop-opacity="0.58" />
      <stop offset="1" stop-color="#A9C8FF" stop-opacity="0" />
